principles:
  - Capability discovery must happen before recommendations that depend on HubSpot tier or scopes.
  - Direct HubSpot APIs are the source of truth for exact records, properties, and configuration.
  - MCP can support future conversational discovery, but V1 writes use explicit API-backed manifest operations.
  - All write operations must be idempotent, logged, and verified by readback.
